name: Quarto Project Security Scan

on:
  push:
    branches: [ main ]
    branches: [ master ]
  pull_request:
    branches: [ main ]
    branches: [ master ]

jobs:
  scan-quarto-project:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Quarto dependencies
        run: |
          # Если есть requirements.txt для Python-зависимостей
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret,misconfig'
          # Исключаем служебные директории
          skip-dirs: '.git,.github,__pycache__,_site,node_modules'

      - name: Check for secrets in code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          output: 'secrets-report.txt'
          skip-dirs: '.git,.github,__pycache__,_site,node_modules'

      - name: Upload results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check for secrets
        run: |
          if [ -s secrets-report.txt ] && [ "$(grep -c "Total: [1-9]" secrets-report.txt)" -gt 0 ]; then
            echo "⚠️ В проекте обнаружены потенциальные секреты!"
            cat secrets-report.txt
            exit 1
          fi